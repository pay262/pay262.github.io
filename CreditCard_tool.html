                else if (cond.job) score += 2;

                // 社保验证
                if (cond.social && !Array.isArray(cond.social) && cond.social !== social) match = false;
                if (cond.social && Array.isArray(cond.social) && !cond.social.includes(social)) match = false;
                else if (cond.social) score += 1;

                // 收入验证
                if (cond.income && !Array.isArray(cond.income) && cond.income !== income) match = false;
                if (cond.income && Array.isArray(cond.income) && !cond.income.includes(income)) match = false;
                else if (cond.income) score += 2;

                // 征信验证
                if (cond.credit && !Array.isArray(cond.credit) && cond.credit !== credit) match = false;
                if (cond.credit && Array.isArray(cond.credit) && !cond.credit.includes(credit)) match = false;
                else if (cond.credit) score += 2;

                // 持卡行数验证
                if (cond.cardNum && !Array.isArray(cond.cardNum) && cond.cardNum !== cardNum) match = false;
                if (cond.cardNum && Array.isArray(cond.cardNum) && !cond.cardNum.includes(cardNum)) match = false;
                else if (cond.cardNum) score += 1;

                // 核心需求验证（权重最高）
                if (cond.need && !Array.isArray(cond.need) && cond.need !== need) match = false;
                if (cond.need && Array.isArray(cond.need) && !cond.need.includes(need)) match = false;
                else if (cond.need) score += 3;

                // 年费接受度验证
                if (cond.fee && !Array.isArray(cond.fee) && cond.fee !== fee) match = false;
                if (cond.fee && Array.isArray(cond.fee) && !cond.fee.includes(fee)) match = false;
                else if (cond.fee) score += 1;

                // 按分数排序匹配结果
                if (match) {
                    if (!bestMatch || score > matchScore) {
                        matchScore = score;
                        bestMatch = card;
                        alternatives = [];
                    } else if (score === matchScore) {
                        alternatives.push(card);
                    }
                }
            }

            // 展示匹配结果（主卡+备选均带超链接）
            if (bestMatch) {
                // 主匹配卡：超链接+等级
                const mainLink = getCardLink(bestMatch.bank, bestMatch.name);
                document.getElementById('cardName').innerHTML = `${bestMatch.bank} — <a href="${mainLink}" target="_blank">${bestMatch.name}</a>（${getLevelName(bestMatch.bank, bestMatch.name)}）`;
                document.getElementById('reason').innerText = bestMatch.reason;

                // 备选卡：拼接超链接，最多展示2个
                let altText = "";
                if (alternatives.length > 0) {
                    altText = "备选方案：";
                    for (let i = 0; i < Math.min(2, alternatives.length); i++) {
                        const altLink = getCardLink(alternatives[i].bank, alternatives[i].name);
                        altText += `${alternatives[i].bank} <a href="${altLink}" target="_blank">${alternatives[i].name}</a>，`;
                    }
                    altText = altText.slice(0, -1);
                }
                document.getElementById('alternative').innerHTML = altText;
            } else {
                document.getElementById('cardName').innerHTML = `未找到完全匹配：建议调整筛选条件`;
                document.getElementById('reason').innerText = "当前条件组合暂无最优卡种，可尝试降低年费要求或调整用卡需求";
                document.getElementById('alternative').innerText = "";
            }
            document.getElementById('result').classList.add('show');
        }
    </script>
</body>
</html>
